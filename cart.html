<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warenkorb</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header mit Logo-Link zur Shop-Seite -->
    <header class="shop-header">
        <a href="shop.html">
            <img src="images/logo.jpg" alt="Shop Logo" class="logo">
        </a>
    </header>

    <!-- Container für die Warenkorb-Elemente -->
    <div id="cart-items" class="cart-container">
        <!-- Warenkorb-Elemente werden hier dynamisch eingefügt -->
    </div>
    <p id="total-amount" class="cart-total">Gesamt: 0,00 €</p>


    <!-- PayPal Button Container -->
    <div class="paypal-button-wrapper">
        <div id="paypal-button-container"></div>
    </div>    

    <p id="result-message"></p>

    <!-- PayPal SDK -->
    <script
        src="https://www.paypal.com/sdk/js?client-id=AUGpqWymYrCygzY-9gpEhBlZzrNKKUT_zzOhi4g_jAAxayVO_dW8QutenFBo1AmIiOiR0YYpoVHxZuNU&currency=EUR">
    </script>

    <!-- JavaScript für die Logik (app.js) -->
    <script src="app.js"></script>
</body>
</html>
